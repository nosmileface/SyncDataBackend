services:
    php:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: sync_php
        volumes:
            - .:/var/www/html
        depends_on:
            - mysql
        networks:
            - sync_network

    nginx:
        image: nginx:alpine
        container_name: sync_nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - sync_network

    mysql:
        image: mysql:8.0
        container_name: sync_mysql
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        ports:
            - "${DB_EXTERNAL_PORT}:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - sync_network

volumes:
    mysql_data:

networks:
    sync_network:
        driver: bridge
